name: Test Auth Flow

on:
  workflow_dispatch:

jobs:
  test-auth-flow:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install
      - name: Start server and run full flow test
        env:
          RADAR_SUPABASE_URL: ${{ secrets.RADAR_SUPABASE_URL }}
          RADAR_SUPABASE_SERVICE_KEY: ${{ secrets.RADAR_SUPABASE_SERVICE_KEY }}
          MARKET_INTEL_SUPABASE_URL: ${{ secrets.RADAR_SUPABASE_URL }}
          MARKET_INTEL_SUPABASE_SERVICE_KEY: ${{ secrets.RADAR_SUPABASE_SERVICE_KEY }}
          JWT_SECRET: test-secret-only-for-ci
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          PORT: 4100
        run: |
          npx tsx src/index.ts > server.log 2>&1 &
          SERVER_PID=$!
          sleep 5
          SERVER_LOG=$(cat server.log | tr '\n' ' ' | cut -c1-500)
          HEALTH=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:4100/health || echo "CURL_FAILED")
          echo "::notice::SERVER_LOG: $SERVER_LOG"
          echo "::notice::HEALTH_STATUS: $HEALTH"
          cat > flow-test.mjs << 'SCRIPT'
          const BASE = 'http://localhost:4100'
          const email = `ci-test-${Date.now()}@dealbase-test.dev`
          const password = 'TestPassword123'
          const out = []

          async function step(name, fn) {
            try {
              const result = await fn()
              out.push({ step: name, ok: true, result })
              return result
            } catch (e) {
              out.push({ step: name, ok: false, error: e.message })
              throw e
            }
          }

          try {
            const reg = await step('register', async () => {
              const r = await fetch(`${BASE}/api/auth/register`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
              })
              const j = await r.json()
              if (!r.ok) throw new Error(`status ${r.status}: ${JSON.stringify(j)}`)
              return j
            })

            const login = await step('login', async () => {
              const r = await fetch(`${BASE}/api/auth/login`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
              })
              const j = await r.json()
              if (!r.ok) throw new Error(`status ${r.status}: ${JSON.stringify(j)}`)
              return j
            })

            const token = login.token

            await step('create_watchlist', async () => {
              const r = await fetch(`${BASE}/api/watchlist`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ name: 'CI test', criteria: { city: 'Kolobrzeg' } })
              })
              const j = await r.json()
              if (!r.ok) throw new Error(`status ${r.status}: ${JSON.stringify(j)}`)
              return j
            })

            await step('get_watchlist', async () => {
              const r = await fetch(`${BASE}/api/watchlist`, {
                headers: { 'Authorization': `Bearer ${token}` }
              })
              const j = await r.json()
              if (!r.ok) throw new Error(`status ${r.status}: ${JSON.stringify(j)}`)
              return j
            })

            await step('deal_score_calculate', async () => {
              const r = await fetch(`${BASE}/api/deal-score/calculate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                  offerPricePerM2: 9800,
                  references: { transactionAvgPricePerM2: 10650, listingsAvgPricePerM2: 10890, archiveTrendPricePerM2: null }
                })
              })
              const j = await r.json()
              if (!r.ok) throw new Error(`status ${r.status}: ${JSON.stringify(j)}`)
              return j
            })

            await step('search_real_apify', async () => {
              const r = await fetch(`${BASE}/api/search`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({
                  city: 'Kolobrzeg',
                  transaction_type: 'sprzedaz',
                  portals: ['otodom'],
                  limit: 3
                })
              })
              const j = await r.json()
              if (!r.ok) throw new Error(`status ${r.status}: ${JSON.stringify(j)}`)
              return { total: j.total, portals_searched: j.portals_searched, errors: j.errors, sample: j.listings?.[0] }
            })

            console.log('WSZYSTKIE KROKI PRZESZLY')
          } catch (e) {
            console.log('BLAD W KROKU:', e.message)
          }

          console.log(JSON.stringify(out, null, 2))

          const summary = out.map(s => `${s.ok ? 'OK' : 'FAIL'}:${s.step}`).join(' | ')
          console.log(`::notice::WYNIK: ${summary}`)

          const searchStep = out.find(s => s.step === 'search_real_apify')
          if (searchStep) {
            console.log(`::notice::SEARCH_DETAIL: ${JSON.stringify(searchStep).substring(0, 800)}`)
          }

          if (out.some(s => !s.ok)) {
            const failed = out.find(s => !s.ok)
            console.log(`::error::${failed.step} - ${failed.error}`)
          }
          SCRIPT
          node flow-test.mjs
