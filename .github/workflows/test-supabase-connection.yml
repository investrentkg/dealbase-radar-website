name: Test Supabase Connection

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-connection:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Test connection to radar schema
        env:
          RADAR_SUPABASE_URL: ${{ secrets.RADAR_SUPABASE_URL }}
          RADAR_SUPABASE_SERVICE_KEY: ${{ secrets.RADAR_SUPABASE_SERVICE_KEY }}
        run: |
          cat > test-connection.mjs << 'SCRIPT'
          import { createClient } from '@supabase/supabase-js'
          import { writeFileSync } from 'fs'
          const radarDb = createClient(process.env.RADAR_SUPABASE_URL, process.env.RADAR_SUPABASE_SERVICE_KEY, { db: { schema: 'radar' } })
          const { data, error, count } = await radarDb.from('users').select('*', { count: 'exact' })
          const result = {
            timestamp: new Date().toISOString(),
            success: !error,
            error: error ? error : null,
            user_count: count ?? null
          }
          writeFileSync('diagnostics-result.json', JSON.stringify(result, null, 2))
          console.log(JSON.stringify(result, null, 2))
          SCRIPT
          node test-connection.mjs || true
      - name: Commit result back to repo
        run: |
          git config user.email "bot@investrentkg.dev"
          git config user.name "DealBase Bot"
          git add diagnostics-result.json
          git commit -m "Diagnostics: Supabase connection test result" || echo "nothing to commit"
          git push

