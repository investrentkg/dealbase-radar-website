name: Test Supabase Connection

on:
  workflow_dispatch:

jobs:
  test-connection:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - name: Test connection to radar schema
        env:
          RADAR_SUPABASE_URL: ${{ secrets.RADAR_SUPABASE_URL }}
          RADAR_SUPABASE_SERVICE_KEY: ${{ secrets.RADAR_SUPABASE_SERVICE_KEY }}
        run: |
          cat > test-connection.mjs << 'SCRIPT'
          import { createClient } from '@supabase/supabase-js'
          const radarDb = createClient(process.env.RADAR_SUPABASE_URL, process.env.RADAR_SUPABASE_SERVICE_KEY, { db: { schema: 'radar' } })
          const { data, error, count } = await radarDb.from('users').select('*', { count: 'exact' })
          if (error) {
            console.log('BLAD:', JSON.stringify(error, null, 2))
            process.exit(1)
          } else {
            console.log('SUKCES - polaczenie z schematem radar dziala.')
            console.log('Liczba uzytkownikow:', count)
          }
          SCRIPT
          node test-connection.mjs
